<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularz - CNU</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Lora&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>
  <nav id="mainNav">
    <div class="nav-left">
      <div class="lang-switcher">
        <button data-lang="en" onclick="setLang('en')" id="lang-en">EN</button>
        <span>|</span>
        <button data-lang="pl" onclick="setLang('pl')" id="lang-pl">PL</button>
      </div>
    </div>

    <div class="nav-right">
      <div class="nav-links" id="navLinks">
        <a href="index.html" data-i18n="home">Home</a>
        <a href="formularz.html" data-i18n="form">Form</a>
        <a href="about.html" data-i18n="about">About</a>
        <a href="events.html" data-i18n="events">Events</a>
        <a href="special-event.html" data-i18n="special-event">Wydarzenie specjalne</a>
      </div>

      <button class="burger" id="burgerBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>


  <!-- FORM SECTION -->
  <section class="form-section">

    <!-- HERO IMAGE -->
    <div class="form-hero">
      <div class="form-hero-overlay">
        <h2 data-i18n="form">Formularz</h2>
      </div>
    </div>

    <!-- FORM -->
    <form id="form" class="form" novalidate>

      <label data-i18n="first-name">IMIĘ*</label>
      <input id="firstName" type="text" placeholder="Imię">
      <div class="error" id="firstNameError"></div>

      <input type="text" id="website" style="display:none"> <!-- honeypot -->

      <label data-i18n="last-name">NAZWISKO*</label>
      <input id="lastName" type="text" placeholder="Nazwisko">
      <div class="error" id="lastNameError"></div>

      <label data-i18n="contact-type">KONTAKT (WYBIERZ TYP)</label>
      <select id="contactType">
        <option value="phone">Telefon</option>
        <option value="email">E-mail</option>
        <option value="instagram">Instagram</option>
      </select>

      <label id="contactLabel" data-i18n="phone">NUMER TELEFONU</label>
      <input type="tel" id="contactInput" placeholder="000-000-000" pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}">
      <div class="error" id="contactError"></div>

      <label data-i18n="gender">PŁEĆ*</label>
      <div class="gender-row">

        <label class="radio-option">
          <input id="genderMale" type="radio" name="gender" value="male">
          <span></span>
          <h data-i18n="male">mężczyzna</h>
        </label>

        <label class="radio-option">
          <input id="genderFemale" type="radio" name="gender" value="female" data-i18n="female">
          <span></span>
          <h data-i18n="female">kobieta</h>
        </label>

      </div>
      <div class="error" id="genderError"></div>

      <label data-i18n="university">UCZELNIA</label>
      <input id="university" type="text">

      <label data-i18n="choose-the-meeting">WYBIERZ SPOTKANIE*</label>
      <select id="meeting">
        <option></option>
        <option data-i18n="student-meeting-title">Spotkanie studenckie</option>
        <option data-i18n="home-meeting-title">Spotkanie domowe</option>
        <option data-i18n="bible-study-meeting-title">Studiowanie Biblii</option>

      </select>
      <div class="error" id="meetingError"></div>

      <label data-i18n="hobbies">HOBBY</label><br>

      <div class="hobby-item">
        <input type="checkbox" id="hobby1" value="Basketball">
        <label for="hobby1" data-i18n="basketball">Basketball</label>
      </div>

      <div class="hobby-item">
        <input type="checkbox" id="hobby2" value="Football">
        <label for="hobby2" data-i18n="football">Football</label>
      </div>

      <div class="hobby-item">
        <input type="checkbox" id="hobby3" value="Volleyball">
        <label for="hobby3" data-i18n="volleyball">Volleyball</label>
      </div>
      <div class="hobby-item">
        <input type="checkbox" id="hobby5" name="hobby5" value="Playing instruments">
        <label for="hobby5" data-i18n="playing-instruments">Playing instruments</label>
      </div>

      <div class="hobby-item">
        <input type="checkbox" id="hobby6" name="hobby6" value="Cooking">
        <label for="hobby6" data-i18n="cooking">Cooking</label>
      </div>

      <div class="hobby-item">
        <input type="checkbox" id="hobby7" name="hobby7" value="Arts & crafts">
        <label for="hobby7" data-i18n="arts-and-crafts">Arts & crafts</label>
      </div>

      <div class="hobby-item">
        <input type="checkbox" id="hobby8" name="hobby8" value="Fishing">
        <label for="hobby8" data-i18n="fishing">Fishing</label>
      </div>

      <div class="hobby-item">
        <input type="checkbox" id="hobby9" name="hobby9" value="Hiking / Camping">
        <label for="hobby9" data-i18n="hiking-and-camping">Hiking / Camping</label>
      </div>

      <div class="hobby-item">
        <input type="checkbox" id="hobby10" name="hobby10" value="Gym / running">
        <label for="hobby10" data-i18n="gym-and-running">Gym / running</label>
      </div>

      <div class="hobby-item">
        <input type="checkbox" id="hobby11" name="hobby11" value="Board games">
        <label for="hobby11" data-i18n="board-games">Board games</label>
      </div>

      <label data-i18n="questions-and-comments">PYTANIA/KOMENTARZE</label>
      <textarea id="comments"></textarea>

      <div id="error" style="color:red; font-size:12px; display:none;"></div>

      <p id="status"></p>

      <div class="center">
        <button id="submitBtn" type="submit" class="send-btn" data-i18n="submit">wyślij</button>
      </div>

    </form>

  </section>
  <section class="contacts">

    <a class="contact-item" href="https://www.instagram.com/cnu_warszawa/" target="_blank" rel="noopener noreferrer">
      <i class="fa fa-instagram"></i>
      <span>cnu.warszawa</span>
    </a>

    <a class="contact-item" href="https://www.facebook.com/share/18swFGHHTY/?mibextid=wwXIfr" target="_blank"
      rel="noopener noreferrer">
      <i class="fa fa-facebook"></i>
      <span>Chrześcijanie na Uczelniach</span>
    </a>

    <a class="contact-item" href="https://youtube.com/@chrzescijanienauczelniach?si=SWbZchQ-9XUdnxLL" target="_blank"
      rel="noopener noreferrer">
      <i class="fa fa-youtube-play"></i>
      <span>CNU</span>
    </a>
    <a class="contact-item" href="#" id="copy-email">
      <i class="fa fa-envelope"></i>
      <span>chrzescijanienauni@gmail.com</span>
    </a>
  </section>

  <script src="js/form.js"></script>
  <script src="js/script.js"></script>
  <script src="js/translation.js"></script>

</body>

</html>
